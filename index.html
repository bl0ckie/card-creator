<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Creator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a1a;
    --surface: #252525;
    --surface2: #2e2e2e;
    --border: #3a3a3a;
    --text: #e8e8e8;
    --text-muted: #888;
    --tab-active: #e8e8e8;
    --tab-inactive: #555;
    --input-bg: #1a1a1a;
    --accent: #444;

    /* Specialty colors */
    --spec-tech: #3a7d44;
    --spec-combat: #b03a2e;
    --spec-influence: #7d3c98;
    --spec-leadership: #8d6e35;
    --spec-medicine: #2a9d8f;
    --spec-science: #d35400;
    --spec-provision: #6b6b6b;
    --spec-helmsmen: #1a4f6e;
    --spec-none: #333;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', Courier, monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 12px 20px;
    border-bottom: 2px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }

  header h1 {
    font-size: 14px;
    font-weight: bold;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  /* Card type tabs */
  .tabs {
    display: flex;
    gap: 0;
  }

  .tab {
    padding: 6px 16px;
    font-family: inherit;
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: var(--surface2);
    color: var(--tab-inactive);
    border: none;
    cursor: pointer;
    border-right: 2px solid var(--border);
    transition: color 0.1s, background 0.1s;
  }

  .tab:last-child { border-right: none; }

  .tab.active {
    background: var(--surface);
    color: var(--tab-active);
  }

  .tab:hover:not(.active) { color: #aaa; }

  /* Main layout */
  main {
    flex: 1;
    display: flex;
    flex-direction: row;
    overflow: hidden;
  }

  /* Form panel */
  .form-panel {
    width: 340px;
    min-width: 280px;
    border-right: 2px solid var(--border);
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field-group label {
    font-size: 10px;
    font-weight: bold;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .field-group input,
  .field-group select,
  .field-group textarea {
    background: var(--input-bg);
    border: 2px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
    width: 100%;
    transition: border-color 0.1s;
  }

  .field-group input:focus,
  .field-group select:focus,
  .field-group textarea:focus {
    border-color: #666;
  }

  .field-group textarea {
    resize: vertical;
    min-height: 80px;
  }

  .field-group select option {
    background: var(--input-bg);
  }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  /* Specialty picker */
  .spec-picker {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }

  .spec-option {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 8px 4px;
    background: var(--surface2);
    border: 2px solid transparent;
    cursor: pointer;
    font-family: inherit;
    font-size: 9px;
    font-weight: bold;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    transition: border-color 0.1s, color 0.1s;
  }

  .spec-option:hover { border-color: var(--border); color: var(--text); }

  .spec-option.selected {
    border-color: currentColor;
    color: var(--text);
  }

  .spec-icon {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Stat row */
  .stat-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  /* Section divider */
  .section-label {
    font-size: 9px;
    font-weight: bold;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--border);
    padding-top: 4px;
    border-top: 1px solid var(--border);
  }

  /* Download button */
  .download-btn {
    margin-top: auto;
    padding-top: 16px;
  }

  .download-btn button {
    width: 100%;
    padding: 12px;
    background: var(--text);
    color: var(--bg);
    border: none;
    font-family: inherit;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.1s;
  }

  .download-btn button:hover { background: #ccc; }
  .download-btn button:active { background: #aaa; }

  /* Preview panel */
  .preview-panel {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
    overflow: auto;
    background: var(--bg);
  }

  .card-preview {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .card-preview-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  #card-svg-container svg {
    display: block;
    height: min(75vh, 560px);
    width: auto;
  }

  /* Hidden template sections */
  .template-fields { display: none; }
  .template-fields.active { display: contents; }

  /* Specialty slots section */
  .spec-slots {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* Mobile */
  @media (max-width: 700px) {
    main {
      flex-direction: column;
    }

    .form-panel {
      width: 100%;
      min-width: 0;
      border-right: none;
      border-bottom: 2px solid var(--border);
      max-height: 55vh;
    }

    .preview-panel {
      padding: 20px;
    }
  }
</style>
</head>
<body>

<header>
  <h1>Card Creator</h1>
  <div class="tabs">
    <button class="tab active" data-template="crew">Crew</button>
    <button class="tab" data-template="gear">Gear</button>
    <button class="tab" data-template="cmnd">CMND</button>
    <button class="tab" data-template="rule">Rule</button>
  </div>
</header>

<main>
  <div class="form-panel">
    <form id="card-form" autocomplete="off">

      <!-- CREW fields -->
      <div class="template-fields active" id="fields-crew">

        <div class="field-group">
          <label>Name</label>
          <input type="text" id="crew-name" maxlength="24" placeholder="HAWKINS" value="HAWKINS">
        </div>

        <div class="field-group">
          <label>Rank</label>
          <select id="crew-rank">
            <option value="grunt">GRUNT</option>
            <option value="apprentice">APPRENTICE</option>
            <option value="specialist" selected>SPECIALIST</option>
          </select>
        </div>

        <div class="spec-slots" id="crew-spec-slots">
          <!-- Populated by JS based on rank -->
        </div>

        <div class="section-label">Stats</div>
        <div class="stat-row">
          <div class="field-group">
            <label>Wounds</label>
            <input type="number" id="crew-wounds" min="0" max="99" value="3">
          </div>
          <div class="field-group">
            <label>Utility</label>
            <input type="number" id="crew-utility" min="0" max="99" value="2">
          </div>
        </div>

        <div class="section-label">Description</div>
        <div class="field-group">
          <textarea id="crew-desc" placeholder="Flavor text... **bold** for emphasis, Enter for new line."></textarea>
        </div>

      </div>

      <!-- GEAR fields -->
      <div class="template-fields" id="fields-gear">

        <div class="field-group">
          <label>Name</label>
          <input type="text" id="gear-name" maxlength="24" placeholder="MEDKIT" value="MEDKIT">
        </div>

        <div class="field-group">
          <label>Uses</label>
          <input type="number" id="gear-uses" min="0" max="99" value="3">
        </div>

        <div class="section-label">Stat Bonuses</div>
        <div class="stat-row">
          <div class="field-group">
            <label>Wounds Bonus</label>
            <input type="text" id="gear-wounds" maxlength="4" placeholder="— or +2" value="+2">
          </div>
          <div class="field-group">
            <label>Utility Bonus</label>
            <input type="text" id="gear-utility" maxlength="4" placeholder="— or +1" value="—">
          </div>
        </div>

        <div class="field-group" id="gear-spec-slot">
          <label>Specialty Bonus</label>
          <!-- Specialty picker injected by JS -->
        </div>

        <div class="section-label">Action Text (optional)</div>
        <div class="field-group">
          <textarea id="gear-action" placeholder="Leave blank if no action..."></textarea>
        </div>

      </div>

      <!-- CMND fields -->
      <div class="template-fields" id="fields-cmnd">

        <div class="field-group">
          <label>Name</label>
          <input type="text" id="cmnd-name" maxlength="24" placeholder="OPEN FIRE" value="OPEN FIRE">
        </div>

        <div class="section-label">Requirements (0–2)</div>
        <div class="spec-slots" id="cmnd-req-slots">
          <!-- Populated by JS -->
        </div>

        <div class="section-label">Text</div>
        <div class="field-group">
          <textarea id="cmnd-text" placeholder="Rules text... **bold** for emphasis, Enter for new line." style="min-height:120px;"></textarea>
        </div>

      </div>

      <!-- RULE fields -->
      <div class="template-fields" id="fields-rule">

        <div class="field-group">
          <label>Title</label>
          <input type="text" id="rule-name" maxlength="24" placeholder="SUPPRESSING FIRE" value="SUPPRESSING FIRE">
        </div>

        <div class="section-label">Specialty</div>
        <div class="spec-slots" id="rule-spec-slot">
          <!-- Populated by JS -->
        </div>

        <div class="section-label">Text</div>
        <div class="field-group">
          <textarea id="rule-text" placeholder="Rule text..." style="min-height:120px;"></textarea>
        </div>

      </div>

    </form>

    <div class="download-btn">
      <button id="download-btn">Download SVG + PNG</button>
    </div>
  </div>

  <div class="preview-panel">
    <div class="card-preview">
      <div id="card-svg-container"></div>
      <div class="card-preview-label">63 × 88 mm</div>
    </div>
  </div>
</main>

<script>
// ─── Specialty definitions ────────────────────────────────────────────────────

const SPECS = {
  none: { name: 'None', color: '#333', textColor: '#666', icon: noneIcon },
  tech: { name: 'Tech', color: '#3a7d44', textColor: '#5ab96a', icon: techIcon },
  combat: { name: 'Combat', color: '#b03a2e', textColor: '#e05545', icon: combatIcon },
  influence: { name: 'Influence', color: '#7d3c98', textColor: '#b05fd4', icon: influenceIcon },
  leadership: { name: 'Leader', color: '#8d6e35', textColor: '#c09a50', icon: leadershipIcon },
  medicine: { name: 'Medicine', color: '#2a9d8f', textColor: '#4ecdc4', icon: medicineIcon },
  science: { name: 'Science', color: '#d35400', textColor: '#f07030', icon: scienceIcon },
  provision: { name: 'Provision', color: '#6b6b6b', textColor: '#aaaaaa', icon: provisionIcon },
  helmsmen: { name: 'Helmsmen', color: '#1a4f6e', textColor: '#2e7da8', icon: helmsmenIcon },
};

// ─── Specialty icons (inline SVG paths, 28×28 viewBox) ───────────────────────

function noneIcon(color) {
  return `<svg width="28" height="28" viewBox="0 0 28 28">
    <line x1="8" y1="8" x2="20" y2="20" stroke="${color}" stroke-width="2.5"/>
    <line x1="20" y1="8" x2="8" y2="20" stroke="${color}" stroke-width="2.5"/>
  </svg>`;
}

function techIcon(color) {
  // Wrench
  return `<svg width="28" height="28" viewBox="0 0 28 28">
    <path d="M18.11 11.7683C20.3522 10.9382 25.4669 10.4911 25.9577 7.29815C26.2522 5.38234 24.9365 4.23117 24.2596 3.46654L22.3357 6.65955L18.11 7.29815L16.9027 3.46654L19.3174 0.529397C18.0795 0.128612 16.299 -0.428501 15.0917 0.529391C12.677 2.44519 13.7033 6.2034 14.488 8.57534L0 20.7087L0.172476 24.814L1.29357 26L5.43301 25.8176L18.11 11.7683Z" fill="${color}"/>
  </svg>`;
}

function combatIcon(color) {
  // Fist
  return `<svg width="28" height="28" viewBox="0 0 28 28">
    <path d="M7.22084 16.0952H19.8833V26H7.22084V16.0952Z" fill="${color}"/>
    <path d="M3.70348 9.90475L10.7382 10.5238L11.4417 8.04761H21.9937L20.5868 15.4762H6.51736L3.70348 9.90475Z" fill="${color}"/>
    <path d="M3.70347 5.57144L11.4417 6.19049L10.3161 9.90477L3 9.28573L3.70347 5.57144Z" fill="${color}"/>
    <path d="M4.40694 0.619049H8.62777V5.2619L4.40694 4.95238V0.619049Z" fill="${color}"/>
    <path d="M18.8281 1.2381H22.3455V7.42857H18.8281V1.2381Z" fill="${color}"/>
    <path d="M14.2556 0.619049H18.1246V7.42857H14.2556V0.619049Z" fill="${color}"/>
    <path d="M9.33124 0H13.5521V7.42857H11.723L12.1451 5.57143L9.33124 5.2619V0Z" fill="${color}"/>
  </svg>`;
}

function influenceIcon(color) {
  // Person head outline
  return `<svg width="28" height="28" viewBox="0 0 28 28">
    <path d="M14 17.8182C18.5103 17.8182 22.1667 13.8294 22.1667 8.90909C22.1667 3.98874 18.5103 0 14 0C9.48967 0 5.83333 3.98874 5.83333 8.90909C5.83333 13.8294 9.48967 17.8182 14 17.8182Z" fill="${color}"/>
    <path d="M0 28C0 16.1212 28 16.1212 28 28H0Z" fill="${color}"/>
  </svg>`;
}

function leadershipIcon(color) {
  // Exclamation point
  return `<svg width="28" height="28" viewBox="0 0 28 28">
    <rect x="11" y="21" width="4" height="4" fill="${color}"/>
    <rect x="11" width="4" height="19" fill="${color}"/>
  </svg>`;
}

function medicineIcon(color) {
  // Cross
  return `<svg width="28" height="28" viewBox="0 0 28 28">
    <rect x="11" y="4" width="6" height="20" fill="${color}"/>
    <rect x="4" y="11" width="20" height="6" fill="${color}"/>
  </svg>`;
}

function scienceIcon(color) {
  // Question mark
  return `<svg width="28" height="28" viewBox="0 0 28 28">
    <path d="M7 5.57143C7 1.28571 19 -0.142857 19 7C19 11.2857 13 11.2857 13 17" stroke="${color}" stroke-width="4" stroke-linecap="square" fill="none"/>
    <path d="M11 21H15V25H11V21Z" fill="${color}"/>
  </svg>`;
}

function provisionIcon(color) {
  // Crate
  return `<svg width="28" height="28" viewBox="0 0 28 28">
    <rect x="2" y="10" width="5.5" height="17" fill="${color}"/>
    <rect x="1.14999" y="4.56757" width="5.5" height="5" transform="rotate(-10 1.14999 4.56757)" fill="${color}"/>
    <rect x="19.3689" y="1.35507" width="5.5" height="5" transform="rotate(-10 19.3689 1.35507)" fill="${color}"/>
    <rect x="7.05884" y="3.52567" width="12" height="5" transform="rotate(-10 7.05884 3.52567)" fill="${color}"/>
    <rect x="20.5" y="10" width="5.5" height="17" fill="${color}"/>
    <rect x="8" y="10" width="12" height="17" fill="${color}"/>
    <rect x="26.5" y="11" width="1.5" height="5" fill="${color}"/>
    <rect y="11" width="1.5" height="5" fill="${color}"/>
  </svg>`;
}

function helmsmenIcon(color) {
  // Ship wheel
  return `<svg width="28" height="28" viewBox="0 0 28 28">
    <circle cx="14" cy="14" r="9" stroke="${color}" stroke-width="2.5" fill="none"/>
    <circle cx="14" cy="14" r="3" fill="${color}"/>
    <line x1="14" y1="5" x2="14" y2="23" stroke="${color}" stroke-width="2"/>
    <line x1="5" y1="14" x2="23" y2="14" stroke="${color}" stroke-width="2"/>
    <line x1="7.6" y1="7.6" x2="20.4" y2="20.4" stroke="${color}" stroke-width="2"/>
    <line x1="20.4" y1="7.6" x2="7.6" y2="20.4" stroke="${color}" stroke-width="2"/>
  </svg>`;
}

// ─── State ────────────────────────────────────────────────────────────────────

const state = {
  template: 'crew',
  crew: {
    name: 'HAWKINS', rank: 'specialist',
    spec1: 'combat', spec2: 'tech',
    wounds: 3, utility: 2, desc: ''
  },
  gear: {
    name: 'MEDKIT', uses: 3,
    woundsBonus: '+2', utilityBonus: '—', specBonus: 'none',
    action: ''
  },
  cmnd: {
    name: 'OPEN FIRE',
    req1: 'combat', req2: 'none',
    text: ''
  },
  rule: {
    name: 'SUPPRESSING FIRE',
    spec: 'combat',
    text: ''
  }
};

// ─── Specialty picker builder ─────────────────────────────────────────────────

function buildSpecPicker(id, currentValue, onChange) {
  const wrap = document.createElement('div');
  wrap.className = 'field-group';

  const grid = document.createElement('div');
  grid.className = 'spec-picker';

  Object.entries(SPECS).forEach(([key, spec]) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'spec-option' + (key === currentValue ? ' selected' : '');
    btn.dataset.spec = key;
    btn.style.color = spec.textColor;
    if (key === currentValue) btn.style.borderColor = spec.textColor;

    btn.innerHTML = `<div class="spec-icon">${spec.icon(spec.color)}</div><span>${spec.name}</span>`;

    btn.addEventListener('click', () => {
      grid.querySelectorAll('.spec-option').forEach(b => {
        b.classList.remove('selected');
        b.style.borderColor = '';
      });
      btn.classList.add('selected');
      btn.style.borderColor = spec.textColor;
      onChange(key);
      renderCard();
    });

    grid.appendChild(btn);
  });

  wrap.appendChild(grid);
  return wrap;
}

// ─── Crew specialty slots (driven by rank) ────────────────────────────────────

function updateCrewSpecSlots() {
  const rank = state.crew.rank;
  const container = document.getElementById('crew-spec-slots');
  container.innerHTML = '';

  if (rank === 'grunt') return;

  const label1 = document.createElement('div');
  label1.className = 'section-label';
  label1.textContent = rank === 'specialist' ? 'Specialty 1' : 'Specialty';
  container.appendChild(label1);
  container.appendChild(buildSpecPicker('crew-spec1', state.crew.spec1, v => { state.crew.spec1 = v; }));

  if (rank === 'specialist') {
    const label2 = document.createElement('div');
    label2.className = 'section-label';
    label2.textContent = 'Specialty 2';
    container.appendChild(label2);
    container.appendChild(buildSpecPicker('crew-spec2', state.crew.spec2, v => { state.crew.spec2 = v; }));
  }
}

// ─── CMND requirement slots ───────────────────────────────────────────────────

function updateCmndReqSlots() {
  const container = document.getElementById('cmnd-req-slots');
  container.innerHTML = '';

  const label1 = document.createElement('div');
  label1.className = 'section-label';
  label1.textContent = 'Requirement 1';
  container.appendChild(label1);
  container.appendChild(buildSpecPicker('cmnd-req1', state.cmnd.req1, v => { state.cmnd.req1 = v; }));

  const label2 = document.createElement('div');
  label2.className = 'section-label';
  label2.textContent = 'Requirement 2';
  container.appendChild(label2);
  container.appendChild(buildSpecPicker('cmnd-req2', state.cmnd.req2, v => { state.cmnd.req2 = v; }));
}

// ─── Rule specialty slot ──────────────────────────────────────────────────────

function updateRuleSpecSlot() {
  const container = document.getElementById('rule-spec-slot');
  container.innerHTML = '';
  container.appendChild(buildSpecPicker('rule-spec', state.rule.spec, v => {
    state.rule.spec = v;
    renderCard();
  }));
}

// ─── Gear specialty bonus slot ────────────────────────────────────────────────

function updateGearSpecSlot() {
  const container = document.getElementById('gear-spec-slot');
  // Remove old picker if present
  const existing = container.querySelector('.field-group');
  if (existing) existing.remove();
  const oldPicker = container.querySelector('.spec-picker');
  if (oldPicker) oldPicker.remove();

  const picker = buildSpecPicker('gear-spec', state.gear.specBonus, v => { state.gear.specBonus = v; });
  container.appendChild(picker.querySelector('.spec-picker'));
}

// ─── SVG Card Renderer ────────────────────────────────────────────────────────

const CARD_W = 252; // ~63mm at 4px/mm
const CARD_H = 352; // ~88mm at 4px/mm

function specColor(key) {
  return SPECS[key] ? SPECS[key].color : '#333';
}

function specSymbolSVG(key, x, y, size = 32, colorOverride = null) {
  const spec = SPECS[key];
  if (!spec || key === 'none') return '';
  const half = size / 2;
  return `<g transform="translate(${x - half}, ${y - half}) scale(${size / 28})">
    ${spec.icon(colorOverride || spec.color)}
  </g>`;
}

function escSVG(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Wraps markdown text into lines, respecting explicit \n and **bold** markers.
// Returns array of strings (markdown preserved) — use renderInline() to draw them.
function wrapMarkdown(text, maxChars, maxLines) {
  const lines = [];
  const paragraphs = text.split('\n');
  for (const para of paragraphs) {
    if (lines.length >= maxLines) break;
    if (para.trim() === '') { lines.push(''); continue; } // blank spacer
    const words = para.split(' ');
    let lineWords = [], lineLen = 0;
    for (const word of words) {
      if (lines.length >= maxLines) break;
      const plain = word.replace(/\*\*/g, '');
      const addLen = lineLen === 0 ? plain.length : plain.length + 1;
      if (lineLen + addLen > maxChars && lineWords.length > 0) {
        lines.push(lineWords.join(' '));
        lineWords = [word];
        lineLen = plain.length;
      } else {
        lineWords.push(word);
        lineLen += addLen;
      }
    }
    if (lineWords.length > 0 && lines.length < maxLines) lines.push(lineWords.join(' '));
  }
  return lines;
}

// Renders a single line with inline **bold** support as an SVG <text> element.
function renderInline(lineText, x, y, fontSize, fill) {
  if (lineText === '') return ''; // blank spacer line — no element
  const re = /\*\*(.*?)\*\*/g;
  let inner = '', last = 0, m;
  while ((m = re.exec(lineText)) !== null) {
    if (m.index > last) inner += `<tspan>${escSVG(lineText.slice(last, m.index))}</tspan>`;
    inner += `<tspan font-weight="bold">${escSVG(m[1])}</tspan>`;
    last = m.index + m[0].length;
  }
  if (last < lineText.length) inner += `<tspan>${escSVG(lineText.slice(last))}</tspan>`;
  return `<text x="${x}" y="${y}" font-family="'Courier New', monospace" font-size="${fontSize}" fill="${fill}">${inner}</text>`;
}

function renderCrewCard() {
  const { name, rank, spec1, spec2, wounds, utility, desc } = state.crew;
  const hasSpec1 = rank !== 'grunt' && spec1 !== 'none';
  const hasSpec2 = rank === 'specialist' && spec2 !== 'none';

  const c1 = hasSpec1 ? specColor(spec1) : '#3a3a3a';
  const c2 = hasSpec2 ? specColor(spec2) : null;

  // Border as colored block strips
  const BORDER = 12;
  const INNER_X = BORDER;
  const INNER_Y = BORDER;
  const INNER_W = CARD_W - BORDER * 2;
  const INNER_H = CARD_H - BORDER * 2;

  // Build border fill — single color, split diagonal, or neutral
  let borderFill = '';
  if (!hasSpec1) {
    borderFill = `<rect width="${CARD_W}" height="${CARD_H}" fill="#2a2a2a"/>`;
  } else if (!c2) {
    borderFill = `<rect width="${CARD_W}" height="${CARD_H}" fill="${c1}"/>`;
  } else {
    // Hard diagonal split: top-left = c1, bottom-right = c2
    borderFill = `
      <rect width="${CARD_W}" height="${CARD_H}" fill="${c2}"/>
      <polygon points="0,0 ${CARD_W},0 0,${CARD_H}" fill="${c1}"/>
    `;
  }

  // Layout: name bar, then a rank+spec strip, then art
  const NAME_H = 28;
  const STRIP_H = 36;   // rank label left, spec icons right — same row
  const ART_Y = INNER_Y + NAME_H + STRIP_H;
  const ART_H = 138;

  const STATS_Y = ART_Y + ART_H + 6;
  const STATS_H = 48;
  const DESC_Y = STATS_Y + STATS_H + 6;

  const CX = INNER_X + INNER_W / 2;

  // Spec icons sit on the right of the strip, vertically centered
  const specCY = INNER_Y + NAME_H + STRIP_H / 2;
  // Rightmost icon edge: 8px from inner right, icons are 28px wide
  const spec2X = INNER_X + INNER_W - 8 - 14;          // center of rightmost icon
  const spec1X = spec2X - 34;                           // center of left icon (gap of 6px)

  const descLines = wrapMarkdown(desc, 34, 6);

  return `<svg xmlns="http://www.w3.org/2000/svg" width="${CARD_W}" height="${CARD_H}" viewBox="0 0 ${CARD_W} ${CARD_H}">
  <!-- Border -->
  ${borderFill}
  <!-- Card body -->
  <rect x="${INNER_X}" y="${INNER_Y}" width="${INNER_W}" height="${INNER_H}" fill="#1a1a1a"/>

  <!-- Name bar -->
  <rect x="${INNER_X}" y="${INNER_Y}" width="${INNER_W}" height="${NAME_H}" fill="#111"/>
  <text x="${CX}" y="${INNER_Y + 19}" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="15" font-weight="bold"
    letter-spacing="3" fill="#e8e8e8">${name.toUpperCase()}</text>

  <!-- Rank strip + spec icons on right -->
  <text x="${INNER_X + 8}" y="${specCY + 4}" font-family="'Courier New', monospace"
    font-size="9" font-weight="bold" letter-spacing="2" fill="${c1}">${rank.toUpperCase()}</text>
  ${rank !== 'grunt' ? `
    ${rank === 'specialist' ? `
      ${specSymbolSVG(spec1, spec1X, specCY, 26)}
      ${specSymbolSVG(spec2 !== 'none' ? spec2 : 'none', spec2X, specCY, 26)}
    ` : `
      ${hasSpec1 ? specSymbolSVG(spec1, spec2X, specCY, 26) : ''}
    `}
  ` : ''}

  <!-- Art area (transparent) -->
  <rect x="${INNER_X}" y="${ART_Y}" width="${INNER_W}" height="${ART_H}" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <text x="${CX}" y="${ART_Y + ART_H / 2 + 4}" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="10" fill="#2a2a2a" letter-spacing="1">ART</text>

  <!-- Stats -->
  <rect x="${INNER_X}" y="${STATS_Y}" width="${INNER_W / 2 - 2}" height="${STATS_H}" fill="#111"/>
  <rect x="${INNER_X + INNER_W / 2 + 2}" y="${STATS_Y}" width="${INNER_W / 2 - 2}" height="${STATS_H}" fill="#111"/>

  <text x="${INNER_X + INNER_W / 4}" y="${STATS_Y + 12}" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="8" letter-spacing="1" fill="#666">WOUNDS</text>
  <text x="${INNER_X + INNER_W / 4}" y="${STATS_Y + 36}" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="26" font-weight="bold" fill="#e8e8e8">${wounds}</text>

  <text x="${INNER_X + INNER_W * 0.75}" y="${STATS_Y + 12}" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="8" letter-spacing="1" fill="#666">UTILITY</text>
  <text x="${INNER_X + INNER_W * 0.75}" y="${STATS_Y + 36}" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="26" font-weight="bold" fill="#e8e8e8">${utility}</text>

  <!-- Description -->
  <rect x="${INNER_X}" y="${DESC_Y}" width="${INNER_W}" height="${INNER_Y + INNER_H - DESC_Y}" fill="#111"/>
  ${descLines.map((line, i) => renderInline(line, INNER_X + 8, DESC_Y + 13 + i * 14, 9, '#888')).join('')}
</svg>`;
}

function renderGearCard() {
  const { name, uses, woundsBonus, utilityBonus, specBonus, action } = state.gear;
  const BORDER = 12;
  const INNER_X = BORDER;
  const INNER_Y = BORDER;
  const INNER_W = CARD_W - BORDER * 2;
  const INNER_H = CARD_H - BORDER * 2;

  // Gear: top half is the "hidden" zone, bottom half is visible when under CREW
  const HALF_Y = INNER_Y + INNER_H / 2;

  const descLines = wrapMarkdown(action, 34, 5);

  return `<svg xmlns="http://www.w3.org/2000/svg" width="${CARD_W}" height="${CARD_H}" viewBox="0 0 ${CARD_W} ${CARD_H}">
  <!-- Neutral border -->
  <rect width="${CARD_W}" height="${CARD_H}" fill="#2a2a2a"/>
  <!-- Card body -->
  <rect x="${INNER_X}" y="${INNER_Y}" width="${INNER_W}" height="${INNER_H}" fill="#1a1a1a"/>

  <!-- Hidden zone indicator (top half) -->
  <rect x="${INNER_X}" y="${INNER_Y}" width="${INNER_W}" height="${INNER_H / 2}" fill="#151515"/>
  <text x="${INNER_X + INNER_W / 2}" y="${INNER_Y + 20}" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="15" font-weight="bold"
    letter-spacing="3" fill="#333">${name.toUpperCase()}</text>
  <text x="${INNER_X + INNER_W / 2}" y="${HALF_Y - 14}" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="8" fill="#2a2a2a" letter-spacing="2">
    ── HIDDEN UNDER CREW ──
  </text>

  <!-- Divider line -->
  <line x1="${INNER_X}" y1="${HALF_Y}" x2="${INNER_X + INNER_W}" y2="${HALF_Y}" stroke="#333" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- Bottom half: stat bonuses -->
  <rect x="${INNER_X}" y="${HALF_Y}" width="${INNER_W / 2 - 2}" height="52" fill="#111"/>
  <rect x="${INNER_X + INNER_W / 2 + 2}" y="${HALF_Y}" width="${INNER_W / 2 - 2}" height="52" fill="#111"/>

  <text x="${INNER_X + INNER_W / 4}" y="${HALF_Y + 13}" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="8" letter-spacing="1" fill="#666">WOUNDS</text>
  <text x="${INNER_X + INNER_W / 4}" y="${HALF_Y + 40}" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="26" font-weight="bold" fill="#aaa">${woundsBonus}</text>

  <text x="${INNER_X + INNER_W * 0.75}" y="${HALF_Y + 13}" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="8" letter-spacing="1" fill="#666">UTILITY</text>
  <text x="${INNER_X + INNER_W * 0.75}" y="${HALF_Y + 40}" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="26" font-weight="bold" fill="#aaa">${utilityBonus}</text>

  <!-- Uses (center bottom) -->
  <text x="${INNER_X + INNER_W / 2}" y="${HALF_Y + 13}" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="8" letter-spacing="1" fill="#666">USES</text>
  <text x="${INNER_X + INNER_W / 2}" y="${HALF_Y + 40}" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="26" font-weight="bold" fill="#e8e8e8">${uses}</text>

  <!-- Specialty bonus -->
  ${specBonus !== 'none' ? `
    ${specSymbolSVG(specBonus, INNER_X + INNER_W / 2, HALF_Y + 70, 28)}
    <text x="${INNER_X + INNER_W / 2}" y="${HALF_Y + 88}" text-anchor="middle"
      font-family="'Courier New', monospace" font-size="8" letter-spacing="1" fill="#666">SPECIALTY</text>
  ` : `
    <text x="${INNER_X + INNER_W / 2}" y="${HALF_Y + 88}" text-anchor="middle"
      font-family="'Courier New', monospace" font-size="8" letter-spacing="1" fill="#333">SPECIALTY: —</text>
  `}

  <!-- Action text -->
  ${action.trim() ? `
    <rect x="${INNER_X}" y="${HALF_Y + 98}" width="${INNER_W}" height="${INNER_Y + INNER_H - (HALF_Y + 98)}" fill="#111"/>
    ${descLines.map((line, i) => renderInline(line, INNER_X + 8, HALF_Y + 112 + i * 14, 9, '#888')).join('')}
  ` : ''}
</svg>`;
}

function renderCmndCard() {
  const { name, req1, req2, text } = state.cmnd;
  const hasReq1 = req1 !== 'none';
  const hasReq2 = req2 !== 'none';

  const c1 = hasReq1 ? specColor(req1) : '#1a1a1a';
  const c2 = hasReq2 ? specColor(req2) : null;

  const BORDER = 12;
  const INNER_X = BORDER;
  const INNER_Y = BORDER;
  const INNER_W = CARD_W - BORDER * 2;
  const INNER_H = CARD_H - BORDER * 2;

  // Background color block (behind card body, accent only)
  // Two non-overlapping triangles over a dark base — no blending
  let bgFill = '';
  if (!hasReq1) {
    bgFill = `<rect width="${CARD_W}" height="${CARD_H}" fill="#1a1a1a"/>`;
  } else if (!c2) {
    bgFill = `<rect width="${CARD_W}" height="${CARD_H}" fill="#1a1a1a"/>
              <rect width="${CARD_W}" height="${CARD_H}" fill="${c1}" opacity="0.35"/>`;
  } else {
    // Hard diagonal: top-left triangle = c1, bottom-right triangle = c2
    // They share the diagonal edge but don't overlap — no color mixing
    bgFill = `
      <rect width="${CARD_W}" height="${CARD_H}" fill="#1a1a1a"/>
      <polygon points="0,0 ${CARD_W},0 0,${CARD_H}" fill="${c1}" opacity="0.35"/>
      <polygon points="${CARD_W},0 ${CARD_W},${CARD_H} 0,${CARD_H}" fill="${c2}" opacity="0.35"/>
    `;
  }

  // Requirement symbols
  const reqSyms = [req1, req2].filter(r => r !== 'none');
  const textLines = wrapMarkdown(text, 34, 14);

  return `<svg xmlns="http://www.w3.org/2000/svg" width="${CARD_W}" height="${CARD_H}" viewBox="0 0 ${CARD_W} ${CARD_H}">
  ${bgFill}
  <!-- Card body -->
  <rect x="${INNER_X}" y="${INNER_Y}" width="${INNER_W}" height="${INNER_H}" fill="#1a1a1a" opacity="0.85"/>

  <!-- Name bar -->
  <rect x="${INNER_X}" y="${INNER_Y}" width="${INNER_W}" height="30" fill="#111"/>
  <text x="${INNER_X + INNER_W / 2}" y="${INNER_Y + 20}" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="15" font-weight="bold"
    letter-spacing="3" fill="#e8e8e8">${name.toUpperCase()}</text>

  <!-- Requirement symbols -->
  ${reqSyms.length > 0 ? `
    <text x="${INNER_X + INNER_W - 8}" y="${INNER_Y + 44}" text-anchor="end"
      font-family="'Courier New', monospace" font-size="8" letter-spacing="1" fill="#555">REQUIRES</text>
    ${reqSyms.map((r, i) => specSymbolSVG(r, INNER_X + INNER_W - 20 - i * 36, INNER_Y + 62, 26)).join('')}
  ` : ''}

  <!-- Text box -->
  <rect x="${INNER_X + 8}" y="${INNER_Y + 82}" width="${INNER_W - 16}" height="${INNER_H - 90}" fill="#111"/>
  ${textLines.map((line, i) => renderInline(line, INNER_X + 8, INNER_Y + 98 + i * 15, 10, '#ccc')).join('')}
</svg>`;
}

function renderRuleCard() {
  const { name, spec, text } = state.rule;
  const hasSpec = spec !== 'none';
  const specObj = hasSpec ? SPECS[spec] : null;

  const BORDER = 12;
  const INNER_X = BORDER;
  const INNER_Y = BORDER;
  const INNER_W = CARD_W - BORDER * 2;
  const INNER_H = CARD_H - BORDER * 2;
  const CX = INNER_X + INNER_W / 2;

  const NAME_H = 28;
  const SPEC_BOX_H = 56;
  const SPEC_Y = INNER_Y + NAME_H;
  const TEXT_Y = SPEC_Y + SPEC_BOX_H;

  const textLines = wrapMarkdown(text, 34, 16);

  // Background: plain dark, no diagonal — single specialty defines the accent
  const specColor = hasSpec ? specObj.color : '#2a2a2a';

  return `<svg xmlns="http://www.w3.org/2000/svg" width="${CARD_W}" height="${CARD_H}" viewBox="0 0 ${CARD_W} ${CARD_H}">
  <!-- Background -->
  <rect width="${CARD_W}" height="${CARD_H}" fill="#1a1a1a"/>

  <!-- Name bar -->
  <rect x="${INNER_X}" y="${INNER_Y}" width="${INNER_W}" height="${NAME_H}" fill="#111"/>
  <text x="${CX}" y="${INNER_Y + 19}" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="15" font-weight="bold"
    letter-spacing="3" fill="#e8e8e8">${name.toUpperCase()}</text>

  <!-- Specialty block -->
  <rect x="${INNER_X}" y="${SPEC_Y}" width="${INNER_W}" height="${SPEC_BOX_H}" fill="${specColor}"/>
  ${hasSpec ? `
    ${specSymbolSVG(spec, CX - 50, SPEC_Y + SPEC_BOX_H / 2, 32, '#fff')}
    <text x="${CX - 26}" y="${SPEC_Y + SPEC_BOX_H / 2 + 6}"
      font-family="'Courier New', monospace" font-size="16" font-weight="bold"
      letter-spacing="3" fill="#fff">${specObj.name.toUpperCase()}</text>
  ` : `
    <text x="${CX}" y="${SPEC_Y + SPEC_BOX_H / 2 + 6}" text-anchor="middle"
      font-family="'Courier New', monospace" font-size="11" letter-spacing="2" fill="#444"></text>
  `}

  <!-- Text box -->
  <rect x="${INNER_X}" y="${TEXT_Y}" width="${INNER_W}" height="${INNER_Y + INNER_H - TEXT_Y}" fill="#111"/>
  ${textLines.map((line, i) => renderInline(line, INNER_X + 8, TEXT_Y + 14 + i * 15, 10, '#ccc')).join('')}
</svg>`;
}

function renderCard() {
  const container = document.getElementById('card-svg-container');
  switch (state.template) {
    case 'crew': container.innerHTML = renderCrewCard(); break;
    case 'gear': container.innerHTML = renderGearCard(); break;
    case 'cmnd': container.innerHTML = renderCmndCard(); break;
    case 'rule': container.innerHTML = renderRuleCard(); break;
  }
}

// ─── Tab switching ────────────────────────────────────────────────────────────

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.template-fields').forEach(f => f.classList.remove('active'));
    tab.classList.add('active');
    state.template = tab.dataset.template;
    document.getElementById('fields-' + state.template).classList.add('active');
    renderCard();
  });
});

// ─── Form input bindings ──────────────────────────────────────────────────────

function bindInput(id, statePath, transform) {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('input', () => {
    const [obj, key] = statePath.split('.');
    state[obj][key] = transform ? transform(el.value) : el.value;
    renderCard();
  });
}

// CREW
bindInput('crew-name', 'crew.name');
bindInput('crew-wounds', 'crew.wounds', v => parseInt(v) || 0);
bindInput('crew-utility', 'crew.utility', v => parseInt(v) || 0);
bindInput('crew-desc', 'crew.desc');

document.getElementById('crew-rank').addEventListener('change', e => {
  state.crew.rank = e.target.value;
  if (state.crew.rank === 'grunt') { state.crew.spec1 = 'none'; state.crew.spec2 = 'none'; }
  if (state.crew.rank === 'apprentice') { state.crew.spec2 = 'none'; }
  updateCrewSpecSlots();
  renderCard();
});

// GEAR
bindInput('gear-name', 'gear.name');
bindInput('gear-uses', 'gear.uses', v => parseInt(v) || 0);
bindInput('gear-wounds', 'gear.woundsBonus');
bindInput('gear-utility', 'gear.utilityBonus');
bindInput('gear-action', 'gear.action');

// CMND
bindInput('cmnd-name', 'cmnd.name');
bindInput('cmnd-text', 'cmnd.text');

// RULE
bindInput('rule-name', 'rule.name');
bindInput('rule-text', 'rule.text');

// ─── Export ───────────────────────────────────────────────────────────────────

document.getElementById('download-btn').addEventListener('click', async () => {
  const container = document.getElementById('card-svg-container');
  const svgEl = container.querySelector('svg');
  if (!svgEl) return;

  const cardName = (state[state.template].name || 'card').toLowerCase().replace(/\s+/g, '-');
  const prefix = `${state.template}-${cardName}`;

  // SVG download
  const svgStr = new XMLSerializer().serializeToString(svgEl);
  const svgBlob = new Blob([svgStr], { type: 'image/svg+xml' });
  triggerDownload(URL.createObjectURL(svgBlob), prefix + '.svg');

  // PNG download via canvas
  const scale = 3;
  const canvas = document.createElement('canvas');
  canvas.width = CARD_W * scale;
  canvas.height = CARD_H * scale;
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);

  const img = new Image();
  const svgDataUrl = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgStr)));
  img.onload = () => {
    ctx.drawImage(img, 0, 0);
    canvas.toBlob(blob => {
      triggerDownload(URL.createObjectURL(blob), prefix + '.png');
    }, 'image/png');
  };
  img.src = svgDataUrl;
});

function triggerDownload(url, filename) {
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ─── Init ─────────────────────────────────────────────────────────────────────

updateCrewSpecSlots();
updateCmndReqSlots();
updateGearSpecSlot();
updateRuleSpecSlot();
renderCard();
</script>
