  <text x="183" y="256" text-anchor="middle" font-family="'Courier New', monospace" font-size="26" font-weight="bold" fill="#e8e8e8">3</text>

  <!-- Description -->
  
    <text x="20" y="286" font-family="'Courier New', monospace" font-size="9" fill="#888">Jimothy lives to haul gear and</text>
  
    <text x="20" y="300" font-family="'Courier New', monospace" font-size="9" fill="#888">cleanup after the 'heroes'.</text>
  
